# RabbitMQ for local dev — same spirit as docker-compose.dev-observability.yml: runs on
# your own machine (not the homelab), on demand, no `restart:` (won't come back on its
# own). Unlike Postgres (fedora-server via Tailscale, shared), there's no shared dev
# RabbitMQ — each dev runs their own disposable instance.
#   docker compose -f docker-compose.dev-mq.yml up -d
#   docker compose -f docker-compose.dev-mq.yml down
name: rdws_dev_mq

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rdws_rabbitmq_dev
    environment:
      RABBITMQ_NODENAME: rabbit@localhost
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rdws_dev}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rdws_dev}
    ports:
      - "5672:5672"   # AMQP — ingestion_service/reading_writer_service
      - "15672:15672" # Management UI (http://localhost:15672)
      - "15692:15692" # Prometheus exporter (rabbitmq_prometheus, habilitado abaixo)
    command: >
      sh -c "echo 'prometheus.return_per_object_metrics = true' >> /etc/rabbitmq/rabbitmq.conf && rabbitmq-plugins enable --offline rabbitmq_prometheus && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

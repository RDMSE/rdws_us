# Production Postgres + migrations (VPS). Lifecycle separate from the app
# (docker-compose.prod-app.yml) — app redeploy never brings the database up/down.
#
# name: equal to docker-compose.prod-app.yml on purpose — both share the same Compose
# project/network (rdws_prod_default), so the gateway resolves "postgres" via DNS even
# when brought up from separate `up` commands.
name: rdws_prod
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rdws_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rdws_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD não definido (ver .env.prod.example)}
      POSTGRES_DB: ${DB_NAME:-rdws_prod}
    # Sem shared_buffers customizado ainda (ver Plano_Deployment.md §2) — a imagem default
    # é conservadora o bastante pro teto de 1GB; ajustar se a VPS apertar. Sem porta
    # publicada — a VPS não deve expor Postgres na internet; acesso via SSH tunnel se
    # necessário para inspeção.
    deploy:
      resources:
        limits:
          memory: 384M # sobe quando a VPS for para 2GB (ver Plano_Deployment.md §2)
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rdws_user} -d ${DB_NAME:-rdws_prod}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "-url=jdbc:postgresql://postgres:5432/${DB_NAME:-rdws_prod}"
      - "-user=${DB_USER:-rdws_user}"
      - "-password=${DB_PASSWORD}"
      - "-baselineOnMigrate=true"
      - migrate
    volumes:
      - ./db/migrations:/flyway/sql
    profiles:
      - migrate

volumes:
  postgres_prod_data:

# Prometheus + Loki + Promtail + Grafana do ambiente dev. Projeto Compose próprio
# (não junta rede com dev-db/qa) — o gateway de dev roda nativo (fora do Docker, via
# CMake) na mesma máquina onde este compose é executado, não como container.
# Prometheus escrapa via host.docker.internal; Promtail lê o arquivo de log local
# (logs/rdws-gateway.log), montado read-only — sem mudança nenhuma no logger.cpp.
#
# Sob demanda, não sempre no ar (ao contrário do stack de QA na homelab): sem
# `restart:` — não volta sozinho se o Docker Desktop reiniciar. Suba quando for
# investigar algo e derrube depois (`down`), em vez de deixar rodando em background
# o tempo todo:
#   docker compose -f docker-compose.dev-observability.yml --env-file .env.dev-db up -d
# (--env-file necessário: datasource Postgres do Grafana usa as mesmas credenciais do
# docker-compose.dev-db.yml pra acessar o Postgres de dev no fedora-server via Tailscale.)
name: rdws_dev_obs
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rdws_prometheus_dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/prometheus/prometheus-dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - "9091:9090"

  loki:
    image: grafana/loki:2.9.6
    container_name: rdws_loki_dev
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_dev_data:/loki
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail:2.9.6
    container_name: rdws_promtail_dev
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-dev.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/rdws:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: rdws_grafana_dev
    # dns aponta pro resolver MagicDNS do Tailscale (100.100.100.100) — só assim o
    # container resolve "fedora-server" (Postgres de dev). Rede continua bridge normal
    # (não network_mode: host): host_mode quebrava a resolução dos nomes dos containers
    # vizinhos (prometheus/loki), deixando os painéis desses datasources vazios.
    dns:
      - 100.100.100.100
    environment:
      DB_HOST: ${DB_HOST:-fedora-server}
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-rdws_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD não definido (ver .env.dev-db.example)}
      DB_NAME: ${DB_NAME:-rdws_us_dev}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3301:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_dev_data:
  loki_dev_data:
  grafana_dev_data:

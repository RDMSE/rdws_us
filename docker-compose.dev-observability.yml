# Prometheus + Loki + Promtail + Grafana for the dev environment. Own Compose project
# (doesn't join the dev-db/qa network) — the dev gateway runs natively (outside Docker,
# via CMake) on the same machine this compose runs on, not as a container.
# Prometheus scrapes via host.docker.internal; Promtail reads the local log file
# (logs/rdws-gateway.log), mounted read-only — no change to logger.cpp needed.
#
# On demand, not always up (unlike the QA stack on the homelab): no `restart:` — won't
# come back on its own if Docker Desktop restarts. Bring it up when investigating
# something and tear it down afterwards (`down`), instead of leaving it running in the
# background all the time:
#   docker compose -f docker-compose.dev-observability.yml --env-file .env.dev-db up -d
# (--env-file required: Grafana's Postgres datasource uses the same credentials as
# docker-compose.dev-db.yml to reach the dev Postgres on fedora-server via Tailscale.)
name: rdws_dev_obs
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rdws_prometheus_dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/prometheus/prometheus-dev.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - "9091:9090"

  loki:
    image: grafana/loki:2.9.6
    container_name: rdws_loki_dev
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_dev_data:/loki
    ports:
      - "3101:3100"

  promtail:
    image: grafana/promtail:2.9.6
    container_name: rdws_promtail_dev
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/promtail-dev.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/rdws:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: rdws_grafana_dev
    # dns points to Tailscale's MagicDNS resolver (100.100.100.100) — that's the only
    # way the container resolves "fedora-server" (dev Postgres). Network stays plain
    # bridge (not network_mode: host): host mode broke resolution of sibling container
    # names (prometheus/loki), leaving those datasources' panels empty.
    dns:
      - 100.100.100.100
    environment:
      DB_HOST: ${DB_HOST:-fedora-server}
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-rdws_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD não definido (ver .env.dev-db.example)}
      DB_NAME: ${DB_NAME:-rdws_us_dev}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_dev_data:/var/lib/grafana
    ports:
      - "3301:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  prometheus_dev_data:
  loki_dev_data:
  grafana_dev_data:

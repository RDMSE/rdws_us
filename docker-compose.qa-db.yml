# QA environment Postgres + migrations. Lifecycle separate from the app (docker-compose.qa-app.yml)
# — gateway redeploy don’t ever bring the database up/down.
#
# name: equals the one in docker-compose.qa-app.yml on purpose — both share the
# same Compose project/network (rdws_qa_default), so the gateway resolves "postgres" via
# DNS even when in separate `up` files/commands.
name: rdws_qa
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: rdws_postgres_qa
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-rdws_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD não definido (ver .env.qa.example)}
      POSTGRES_DB: ${DB_NAME:-rdws_qa}
    ports:
      # 5433 (não 5432, já usado pelo rdws_dev no mesmo host) — exposto pra acesso via
      # DBeaver/psql direto via Tailscale. Serviços do compose de QA continuam usando
      # DNS interno ("postgres:5432"), não essa porta publicada.
      - "5433:5432"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rdws_user} -d ${DB_NAME:-rdws_qa}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - "-url=jdbc:postgresql://postgres:5432/${DB_NAME:-rdws_qa}"
      - "-user=${DB_USER:-rdws_user}"
      - "-password=${DB_PASSWORD}"
      - "-baselineOnMigrate=true"
      - migrate
    volumes:
      - ./db/migrations:/flyway/sql
    profiles:
      - migrate

  # Daily cleanup of request_history (90d) / capability_metrics (30d) — calls the
  # functions created in db/migrations/V2__persistence_tables.sql. No pg_cron (not
  # bundled with the postgis/postgis image, would require building a custom image just
  # for this): simple external loop, runs once at start and then every 24h. Daily
  # granularity is enough for a retention policy measured in days.
  db_cleanup:
    image: postgres:16-alpine
    container_name: rdws_db_cleanup_qa
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${DB_USER:-rdws_user}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD não definido (ver .env.qa.example)}
      PGDATABASE: ${DB_NAME:-rdws_qa}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[db_cleanup] $(date -Iseconds) running cleanup_old_request_history / cleanup_old_capability_metrics";
          psql -v ON_ERROR_STOP=1 -c "SELECT cleanup_old_request_history();" -c "SELECT cleanup_old_capability_metrics();";
          sleep 86400;
        done

volumes:
  postgres_qa_data:
